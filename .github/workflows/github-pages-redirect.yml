# Keep https://league-fan.github.io/ as an entry URL that sends users to
# Cloudflare Pages. GitHub controls *.github.io DNS — we cannot point it at CF,
# so the only way for the old URL to "use" CF is a client redirect.
#
# Publishes a tiny static site to the gh-pages branch (repo Pages source).

name: GitHub Pages → Cloudflare redirect

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/github-pages-redirect.yml"
      - "scripts/gh-pages-redirect/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-redirect
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare redirect site
        run: |
          mkdir -p _gh_pages
          cp -R scripts/gh-pages-redirect/* _gh_pages/
          # SPA-style deep links: unknown paths hit 404.html on GitHub Pages
          # (see scripts/gh-pages-redirect/404.html)

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_gh_pages
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
