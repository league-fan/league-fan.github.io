<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // Preserve deep links: /skins → CF Pages /skins
      var path = location.pathname.replace(/^\//, "");
      var target = "https://league-fan-github-io.pages.dev/" + path + location.search + location.hash;
      location.replace(target);
    </script>
    <meta http-equiv="refresh" content="0;url=https://league-fan-github-io.pages.dev/" />
  </head>
  <body>
    <p><a href="https://league-fan-github-io.pages.dev/">League Fan</a></p>
  </body>
</html>
