name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci --legacy-peer-deps
      - name: Build
        env:
          # Same default as production Pages (prebuilt JSON CDN)
          VITE_ASSETS_BASE: https://league-fan-data.yxra3603.workers.dev/latest
        run: npm run build
      - name: Check SPA redirects / headers present in dist
        run: |
          test -f dist/_redirects
          test -f dist/_headers
          test -f dist/index.html
